name: Publish to WinGet

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish-winget:
    runs-on: ubuntu-latest
    steps:
      - name: Determine release tag
        id: release
        run: |
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall komac -y
      - name: Sync WinGet fork
        env:
          GH_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: gh repo sync bgreenwell/winget-pkgs
      - name: Submit manifest pull request
        env:
          GH_TOKEN: ${{ secrets.WINGET_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          url="https://github.com/bgreenwell/git-ego/releases/download/${{ steps.release.outputs.tag }}/git-ego-${{ steps.release.outputs.tag }}-windows-x86_64.zip"

          if ! gh api repos/microsoft/winget-pkgs/contents/manifests/b/bgreenwell/GitEgo > /dev/null 2>&1; then
            echo "The initial WinGet manifest must be submitted manually before automated updates can run."
            exit 0
          fi

          komac update bgreenwell.GitEgo \
            --version "${{ steps.release.outputs.version }}" \
            --urls "$url" \
            --submit
